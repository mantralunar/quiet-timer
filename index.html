<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quiet Countdown</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  height: 100%;
  width: 100%;
}

html {
  position: fixed;
  width: 100%;
}

body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;

  display: flex;
  justify-content: center;
  align-items: flex-start;

  min-height: 100vh;
  padding: 2vh 1rem 1rem;

  font-size: clamp(16px, 1.2vw, 18px);
}

.card {
  width: min(92vw, 600px);
  padding: clamp(1.5rem, 3vw, 2.5rem);
  padding-top: clamp(1rem, 2vw, 1.5rem);
  padding-bottom: clamp(2rem, 3vw, 3rem);
  border-radius: 24px;
  text-align: center;
  background: #111827;
  transform-origin: center;
}

.circle {
  position: relative;
  width: min(70vw, 420px);
  height: min(70vw, 420px);
  margin: 0.5rem auto 1.5rem;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.time {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: bold;
}

.status {
  margin-top: 0.2rem;
  color: #94a3b8;
}

.buttons {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 0.8rem;
}

button {
  padding: 0.8rem 1.4rem;
  border-radius: 14px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
  min-height: 48px;
}

button.secondary { background: #374151; }

.control {
  margin-top: 1rem;
  text-align: left;
}

input[type="range"] {
  width: 100%;
  margin-top: 0.8rem;
  padding: 14px 0;
  touch-action: none;
  -webkit-appearance: none;
  background: transparent;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #22c55e;
  margin-top: -9px;
}

input[type="range"]::-webkit-slider-runnable-track {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
}

@keyframes pulse {
  0% { stroke-width: 10; }
  50% { stroke-width: 14; }
  100% { stroke-width: 10; }
}
</style>
</head>

<body>

<div class="card">

<div class="circle">
<svg viewBox="0 0 200 200">
<circle cx="100" cy="100" r="90" stroke="#1f2937" stroke-width="10" fill="none"/>
<circle id="progress"
  cx="100" cy="100" r="90"
  stroke="#22c55e"
  stroke-width="10"
  fill="none"
  stroke-linecap="round"
  stroke-dasharray="565"
  stroke-dashoffset="0"/>
</svg>
<div class="time" id="time">15:00</div>
</div>

<div class="status" id="status">Ready</div>

<div class="buttons">
<button id="main">Start</button>
<button id="reset" class="secondary" disabled>Reset</button>
</div>

<div class="control">
<label>Duration (minutes)</label>
<input type="number" id="duration" value="15">
</div>

<div class="control">
<label>Maximum noise level</label>
<input id="threshold" type="range" min="0" max="1" step="0.01" value="0.3">
</div>

</div>

<script>
const MAX_VOLUME = 0.1;
const circumference = 2 * Math.PI * 90;

let timeLeft = 900;
let totalTime = 900;

let running = false;
let isActive = false;
let wasTooLoud = false;

const progressEl = document.getElementById("progress");
const thresholdEl = document.getElementById("threshold");

function updateCircle() {
  if (wasTooLoud) return;
  progressEl.style.strokeDashoffset =
    circumference * (1 - timeLeft / totalTime);
}

function simulateVolume() {
  return Math.random(); // demo only
}

function tick() {
  const norm = simulateVolume();
  const thr = parseFloat(thresholdEl.value);
  const isQuiet = norm < thr;

  if (!isQuiet) {
    if (!wasTooLoud) {
      wasTooLoud = true;

      progressEl.style.stroke = "#ef4444";
      progressEl.style.animation = "none";

      progressEl.style.transition = "stroke-dashoffset 0.4s ease-out";
      progressEl.style.strokeDashoffset = 0;

      setTimeout(() => {
        progressEl.style.transition = "";
        progressEl.style.animation = "pulse 0.6s infinite";
      }, 400);
    }
  } else {
    if (wasTooLoud) {
      wasTooLoud = false;
      progressEl.style.animation = "none";
      progressEl.style.stroke = "#22c55e";
      updateCircle();
    }

    if (running) {
      timeLeft -= 0.05;
      if (timeLeft < 0) timeLeft = 0;
      updateCircle();
    }
  }

  requestAnimationFrame(tick);
}

tick();
</script>

</body>
</html>
