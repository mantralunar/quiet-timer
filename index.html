<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quiet Countdown</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  touch-action: none;
  height: 100%;
  width: 100%;
}

body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;

  /* 👇 subtle upward bias */
  padding: 2vh 1rem 1rem;

  font-size: clamp(16px, 1.2vw, 18px);
}

.card {
  width: min(92vw, 600px);
  max-width: 100%;
  max-height: 95vh;

  display: flex;
  flex-direction: column;
  justify-content: center;

  padding: clamp(1.5rem, 3vw, 2.5rem);
  border-radius: 24px;
  text-align: center;
  background: #111827;
}

.circle {
  position: relative;
  width: min(65vw, 380px);
  height: min(65vw, 380px);
  margin: 0.3rem auto 1rem;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  overflow: visible;
}

.time {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: bold;
}

.status {
  margin-top: 0.2rem;
  color: #94a3b8;
}

.buttons {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 0.8rem;
}

button {
  padding: 0.8rem 1.4rem;
  border-radius: 14px;
  border: none;
  background: #2563eb;
  color: white;
  min-height: 48px;
  font-size: 1rem;
}

button.secondary { background: #374151; }
button:disabled { opacity: 0.5; }

.control {
  margin-top: 1rem;
  text-align: left;
}

.control label {
  font-size: 0.95rem;
  color: #94a3b8;
}

input[type="number"] {
  width: 100%;
  font-size: 1rem;
  padding: 0.5rem;
}

input[type="range"] {
  width: 100%;
  margin-top: 0.8rem;
  padding: 14px 0;
  touch-action: none;
  -webkit-appearance: none;
  background: transparent;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #22c55e;
  margin-top: -9px;
}

input[type="range"]::-webkit-slider-runnable-track {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
}

.meter {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 0.5rem;
}

.meter-fill {
  height: 100%;
  width: 0%;
  transition: width 0.1s, background 0.2s;
}

/* Glow animation */
@keyframes glow {
  0% {
    stroke: #ef4444;
    filter: drop-shadow(0 0 0px rgba(239,68,68,0.4));
  }
  50% {
    stroke: #f87171;
    filter: drop-shadow(0 0 8px rgba(239,68,68,0.8));
  }
  100% {
    stroke: #ef4444;
    filter: drop-shadow(0 0 0px rgba(239,68,68,0.4));
  }
}

/* Mobile tweaks */
@media (max-width: 600px) {

  .circle {
    width: 65vw;
    height: 65vw;
  }

  .time {
    font-size: 11vw;
  }

  .buttons {
    flex-direction: column;
    gap: 0.6rem;
  }

  button {
    width: 100%;
    font-size: 1.2rem;
    padding: 0.9rem;
  }

  .control {
    margin-top: 0.8rem;
  }

  .control label {
    font-size: 0.95rem;
  }

  .meter {
    height: 8px;
  }
}
</style>
</head>

<body>

<div class="card">

<div class="circle">
<svg viewBox="0 0 200 200">
<circle cx="100" cy="100" r="88" stroke="#1f2937" stroke-width="10" fill="none"/>
<circle id="progress"
  cx="100" cy="100" r="88"
  stroke="#22c55e"
  stroke-width="10"
  fill="none"
  stroke-linecap="round"
  stroke-dasharray="552"
  stroke-dashoffset="0"/>
</svg>
<div class="time" id="time">15:00</div>
</div>

<div class="status" id="status">Ready</div>

<div class="buttons">
<button id="main">Start</button>
<button id="reset" class="secondary" disabled>Reset</button>
</div>

<div class="control">
<label>Duration (minutes)</label>
<input type="number" id="duration" value="15">
</div>

<div class="control">
<label>Maximum noise level</label>
<div class="meter">
  <div id="meter" class="meter-fill"></div>
</div>
<input id="threshold" type="range" min="0" max="1" step="0.01" value="0.3">
</div>

</div>

<script>
const MAX_VOLUME = 0.3;
const circumference = 2 * Math.PI * 88;

let audioContext, analyser, dataArray;

let timeLeft = 900;
let totalTime = 900;

let running = false;
let manuallyPaused = false;
let started = false;
let isActive = false;

let pauseUntil = 0;
let lastTick = null;
let smoothedVolume = 0;

let waitingAlertActive = false;
let waitingAlertTimeout = null;

const mainBtn = document.getElementById("main");
const resetBtn = document.getElementById("reset");

const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");
const meterEl = document.getElementById("meter");
const progressEl = document.getElementById("progress");

const thresholdEl = document.getElementById("threshold");
const durationEl = document.getElementById("duration");

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;
}

function updateButtons() {
  if (!isActive) {
    mainBtn.textContent = "Start";
    resetBtn.disabled = true;
  } else if (manuallyPaused) {
    mainBtn.textContent = "Resume";
    resetBtn.disabled = false;
  } else {
    mainBtn.textContent = "Pause";
    resetBtn.disabled = false;
  }
}

function updateCircle() {
  if (waitingAlertActive) return;
  progressEl.style.strokeDashoffset =
    circumference * (1 - timeLeft / totalTime);
}

function getVolume(){
  analyser.getFloatTimeDomainData(dataArray);
  let sum=0;
  for(let i=0;i<dataArray.length;i++){
    sum+=dataArray[i]*dataArray[i];
  }
  const rms = Math.sqrt(sum/dataArray.length);
  smoothedVolume = smoothedVolume*0.9 + rms*0.1;
  return smoothedVolume;
}

function startWaitingAlert(){
  if (waitingAlertActive) return;

  waitingAlertActive = true;
  progressEl.style.animation = "none";
  progressEl.style.stroke = "#ef4444";

  progressEl.style.transition = "stroke-dashoffset 0.4s ease-out";
  progressEl.style.strokeDashoffset = 0;

  waitingAlertTimeout = setTimeout(()=>{
    progressEl.style.transition = "";
    progressEl.style.animation = "glow 1s infinite";
  },400);
}

function setRingReady(){
  if (waitingAlertActive){
    progressEl.style.animation = "none";
    progressEl.style.filter = "";
    progressEl.style.stroke = "#22c55e";

    progressEl.style.transition = "stroke-dashoffset 0.4s ease-out";
    progressEl.style.strokeDashoffset =
      circumference * (1 - timeLeft / totalTime);

    setTimeout(()=>{
      progressEl.style.transition = "";
      waitingAlertActive = false;
    },400);
  } else {
    progressEl.style.stroke = "#22c55e";
    updateCircle();
  }
}

function tick(now){
  if(!lastTick) lastTick=now;
  const dt=(now-lastTick)/1000;
  lastTick=now;

  if(!analyser){ requestAnimationFrame(tick); return; }

  const vol=getVolume();
  const norm=Math.min((vol / MAX_VOLUME) ** 0.8,1);
  const thr=parseFloat(thresholdEl.value);

  meterEl.style.width=(norm*100)+"%";
  meterEl.style.background=norm<thr?"#22c55e":"#ef4444";

  const isQuiet=norm<thr;

  if (!isActive){
    running=false;
    statusEl.textContent="Ready";
    setRingReady();

  } else if (manuallyPaused){
    running=false;
    statusEl.textContent="Paused";

    waitingAlertActive = false;
    progressEl.style.animation = "none";
    progressEl.style.filter = "";
    progressEl.style.transition = "";
    progressEl.style.stroke = "#f59e0b";

    updateCircle();

  } else {
    if (!isQuiet) pauseUntil=now+3000;
    running=(now>=pauseUntil && isQuiet);

    if (running){
      statusEl.textContent="Running";
      setRingReady();
    } else {
      statusEl.textContent="Waiting for quiet";
      startWaitingAlert();
    }
  }

  if (running){
    timeLeft-=dt;
    if(timeLeft<0) timeLeft=0;

    timeEl.textContent=formatTime(timeLeft);
    updateCircle();

    if(timeLeft===0){
      running=false;
      isActive=false;
      statusEl.textContent="Finished";
      progressEl.style.stroke="#3b82f6";
    }
  }

  updateButtons();
  requestAnimationFrame(tick);
}

mainBtn.onclick = async () => {
  if(!started){
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioContext=new AudioContext();
    const src=audioContext.createMediaStreamSource(stream);
    analyser=audioContext.createAnalyser();
    analyser.fftSize=2048;
    dataArray=new Float32Array(analyser.fftSize);
    src.connect(analyser);
    requestAnimationFrame(tick);
    started=true;
  }

  if (!isActive){
    isActive=true;
    manuallyPaused=false;
    totalTime=parseInt(durationEl.value)*60;
    timeLeft=totalTime;
  } else if (!manuallyPaused){
    manuallyPaused=true;
  } else {
    manuallyPaused=false;
  }

  updateButtons();
};

resetBtn.onclick=()=>{
  isActive=false;
  manuallyPaused=false;
  running=false;
  totalTime=parseInt(durationEl.value)*60;
  timeLeft=totalTime;
  statusEl.textContent="Ready";
  progressEl.style.stroke="#22c55e";
  updateButtons();
};
</script>

</body>
</html>
