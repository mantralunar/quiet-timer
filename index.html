<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiet Countdown</title>

<style>
/* (same styles as before, unchanged) */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: grid;
  place-items: center;
  height: 100vh;
}

.card {
  width: min(90vw, 600px);
  padding: 2rem;
  border-radius: 24px;
  text-align: center;
  background: linear-gradient(145deg, #111827, #0b1220);
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow:
    0 20px 50px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

.circle {
  position: relative;
  width: min(70vw, 420px);
  height: min(70vw, 420px);
  margin: 2rem auto;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.time {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: bold;
}

.status {
  margin-top: 1rem;
  color: #94a3b8;
}

.buttons {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1rem;
}

button {
  padding: 0.6rem 1.2rem;
  border-radius: 12px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button.secondary {
  background: #374151;
}

.meter {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 1rem;
}

.meter-fill {
  height: 100%;
  width: 0%;
  transition: width 0.1s;
}

.meter-limit {
  position: absolute;
  width: 2px;
  background: red;
  height: 10px;
}
</style>
</head>

<body>

<div class="card">

  <div class="circle">
    <svg viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="90" stroke="#1f2937" stroke-width="10" fill="none"/>
      <circle id="progress"
        cx="100" cy="100" r="90"
        stroke="#22c55e"
        stroke-width="10"
        fill="none"
        stroke-dasharray="565"
        stroke-dashoffset="565"/>
    </svg>
    <div class="time" id="time">15:00</div>
  </div>

  <div class="status" id="status">Ready</div>

  <div class="buttons">
    <button id="main">Start</button>
    <button id="restart" class="secondary">Restart</button>
  </div>

  <input id="threshold" type="range" min="0" max="1" step="0.01" value="0.3">

  <div class="meter">
    <div class="meter-fill" id="meter"></div>
  </div>

</div>

<script>
let audioContext, analyser, dataArray;

let timeLeft = 900;
let totalTime = 900;

let running = false;
let manuallyPaused = false;
let started = false;

let pauseUntil = 0;
let lastTick = null;

const mainBtn = document.getElementById("main");
const restartBtn = document.getElementById("restart");

const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");
const meterEl = document.getElementById("meter");

const thresholdEl = document.getElementById("threshold");

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;
}

function getVolume(){
  analyser.getFloatTimeDomainData(dataArray);
  let sum=0;
  for(let i=0;i<dataArray.length;i++){
    sum+=dataArray[i]*dataArray[i];
  }
  return Math.sqrt(sum/dataArray.length);
}

function tick(now){
  if(!lastTick) lastTick=now;
  const dt=(now-lastTick)/1000;
  lastTick=now;

  const vol = getVolume();
  const norm = Math.min(vol/0.1,1);
  const thr = parseFloat(thresholdEl.value);

  meterEl.style.width = (norm*100)+"%";
  meterEl.style.background = norm < thr ? "green" : "red";

  if(!manuallyPaused){
    if(norm >= thr) pauseUntil = now + 3000;

    running = (now >= pauseUntil && norm < thr);
    statusEl.textContent = running ? "Running" : "Paused — waiting for quiet";
  }

  if(running){
    timeLeft -= dt;
    if(timeLeft<0) timeLeft=0;
    timeEl.textContent = formatTime(timeLeft);

    if(timeLeft===0){
      running=false;
      statusEl.textContent="Finished";
    }
  }

  requestAnimationFrame(tick);
}

mainBtn.onclick = async () => {

  if(!started){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioContext = new AudioContext();
    const src = audioContext.createMediaStreamSource(stream);

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    dataArray = new Float32Array(analyser.fftSize);

    src.connect(analyser);

    requestAnimationFrame(tick);
    started = true;
  }

  if(running){
    manuallyPaused = true;
    running = false;
    mainBtn.textContent = "Resume";
  } else {
    manuallyPaused = false;
    mainBtn.textContent = "Pause";
  }
};

restartBtn.onclick = () => {
  timeLeft = totalTime;
  timeEl.textContent = formatTime(timeLeft);
  manuallyPaused = false;
  mainBtn.textContent = "Pause";
};
</script>

</body>
</html>
