<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quiet Countdown</title>

<style>
* {
  box-sizing: border-box;
}

/* Lock layout */
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  height: 100%;
  width: 100%;
}

html {
  position: fixed;
  width: 100%;
}

/* Upward-biased layout */
body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;

  display: flex;
  justify-content: center;
  align-items: flex-start;     /* 👈 shifted upward */

  min-height: 100vh;
  padding: 2vh 1rem 1rem;

  font-size: clamp(16px, 1.2vw, 18px);
}

/* Card */
.card {
  width: min(92vw, 600px);
  max-width: 100%;

  padding: clamp(1.5rem, 3vw, 2.5rem);
  padding-top: clamp(1rem, 2vw, 1.5rem);     /* 👈 reduced */
  padding-bottom: clamp(2rem, 3vw, 3rem);    /* 👈 increased */

  border-radius: 24px;
  text-align: center;
  background: #111827;

  transform-origin: center;
  will-change: transform;
}

/* Circle */
.circle {
  position: relative;
  width: min(70vw, 420px);
  height: min(70vw, 420px);
  margin: 0.5rem auto 1.5rem; /* 👈 tighter top */
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.time {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: bold;
}

.status {
  margin-top: 0.2rem;
  color: #94a3b8;
  font-size: 1rem;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 0.8rem;
}

button {
  padding: 0.8rem 1.4rem;
  border-radius: 14px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 48px;
  font-size: 1rem;
}

button.secondary {
  background: #374151;
}

button:disabled {
  opacity: 0.5;
}

/* Controls */
.control {
  margin-top: 1rem;
  text-align: left;
}

.control label {
  font-size: 0.95rem;
  color: #94a3b8;
}

input[type="number"] {
  width: 100%;
  font-size: 1rem;
  padding: 0.5rem;
}

/* Slider */
input[type="range"] {
  width: 100%;
  margin-top: 0.8rem;
  padding: 14px 0;
  touch-action: none;
  -webkit-appearance: none;
  background: transparent;
}

input[type="range"]::-webkit-slider-runnable-track {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
}

input[type="range"]::-moz-range-track {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #22c55e;
  margin-top: -9px;
  cursor: pointer;
}

input[type="range"]::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #22c55e;
  cursor: pointer;
}

/* Meter */
.meter-wrapper {
  position: relative;
  margin-top: 0.6rem;
}

.meter {
  position: relative;
  height: 12px;
  background: #1f2937;
  border-radius: 999px;
  overflow: hidden;
}

.meter-fill {
  height: 100%;
  width: 0%;
  transition: width 0.1s, background 0.2s;
}

.meter-limit {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #f87171;
}

/* Mobile */
@media (max-width: 600px) {
  .circle {
    width: 80vw;
    height: 80vw;
  }

  .time {
    font-size: 12vw;
  }

  .buttons {
    flex-direction: column;
  }

  button {
    width: 100%;
    font-size: 1.3rem;
    padding: 1rem;
  }

  .control label {
    font-size: 1rem;
  }
}
</style>
</head>

<body>

<div class="card">

<div class="circle">
<svg viewBox="0 0 200 200">
<circle cx="100" cy="100" r="90" stroke="#1f2937" stroke-width="10" fill="none"/>
<circle id="progress"
  cx="100" cy="100" r="90"
  stroke="#22c55e"
  stroke-width="10"
  fill="none"
  stroke-linecap="round"
  stroke-dasharray="565"
  stroke-dashoffset="0"/>
</svg>
<div class="time" id="time">15:00</div>
</div>

<div class="status" id="status">Ready</div>

<div class="buttons">
<button id="main">Start</button>
<button id="reset" class="secondary" disabled>Reset</button>
</div>

<div class="control">
<label>Duration (minutes)</label>
<input type="number" id="duration" value="15">
</div>

<div class="control">
<label>Maximum noise level</label>

<div class="meter-wrapper">
  <div class="meter">
    <div id="meter" class="meter-fill"></div>
    <div id="meterLimit" class="meter-limit"></div>
  </div>
</div>

<input id="threshold" type="range" min="0" max="1" step="0.01" value="0.3">

</div>

</div>

<script>
/* Existing JS unchanged */
const MAX_VOLUME = 0.1;
const circumference = 2 * Math.PI * 90;

let audioContext, analyser, dataArray;

let timeLeft = 900;
let totalTime = 900;

let running = false;
let manuallyPaused = false;
let started = false;
let isActive = false;

let pauseUntil = 0;
let lastTick = null;
let smoothedVolume = 0;

const mainBtn = document.getElementById("main");
const resetBtn = document.getElementById("reset");

const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");
const meterEl = document.getElementById("meter");
const meterLimit = document.getElementById("meterLimit");
const progressEl = document.getElementById("progress");

const thresholdEl = document.getElementById("threshold");
const durationEl = document.getElementById("duration");

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;
}

function updateCircle() {
  progressEl.style.strokeDashoffset =
    circumference * (1 - timeLeft / totalTime);
}

function updateButtons() {
  if (!isActive) {
    mainBtn.textContent = "Start";
    resetBtn.disabled = true;
  } else if (manuallyPaused) {
    mainBtn.textContent = "Resume";
    resetBtn.disabled = false;
  } else {
    mainBtn.textContent = "Pause";
    resetBtn.disabled = false;
  }
}

function getVolume(){
  analyser.getFloatTimeDomainData(dataArray);
  let sum=0;
  for(let i=0;i<dataArray.length;i++){
    sum+=dataArray[i]*dataArray[i];
  }
  const rms = Math.sqrt(sum/dataArray.length)*1.5;
  smoothedVolume = smoothedVolume*0.9 + rms*0.1;
  return smoothedVolume;
}

function tick(now){
  if(!lastTick) lastTick=now;
  const dt=(now-lastTick)/1000;
  lastTick=now;

  if(!analyser){ requestAnimationFrame(tick); return; }

  const vol=getVolume();
  const norm=Math.min(vol/MAX_VOLUME,1);
  const thr=parseFloat(thresholdEl.value);

  meterEl.style.width=(norm*100)+"%";
  meterLimit.style.left=(thr*100)+"%";
  meterEl.style.background=norm<thr?"#22c55e":"#ef4444";

  const isQuiet=norm<thr;

  if (!isActive) {
    running = false;
    statusEl.textContent = "Ready";
    progressEl.style.stroke = "#22c55e";

  } else if (manuallyPaused) {
    running = false;
    statusEl.textContent = "Paused";
    progressEl.style.stroke = "#f59e0b";

  } else {
    if (!isQuiet) pauseUntil = now + 3000;
    running = (now >= pauseUntil && isQuiet);

    if (running) {
      statusEl.textContent = "Running";
      progressEl.style.stroke = "#22c55e";
    } else {
      statusEl.textContent = "Waiting for quiet";
      progressEl.style.stroke = "#f59e0b";
    }
  }

  if (running) {
    timeLeft -= dt;
    if (timeLeft < 0) timeLeft = 0;

    timeEl.textContent = formatTime(timeLeft);
    updateCircle();

    if (timeLeft === 0) {
      running = false;
      isActive = false;
      statusEl.textContent = "Finished";
      progressEl.style.stroke = "#3b82f6";
    }
  }

  updateButtons();
  requestAnimationFrame(tick);
}

/* Dynamic scaling */
function scaleToFit() {
  const card = document.querySelector(".card");

  card.style.transform = "scale(1)";

  const rect = card.getBoundingClientRect();
  const vh = window.innerHeight;

  const padding = 20;
  const available = vh - padding;

  if (rect.height > available) {
    const scale = Math.max(0.85, available / rect.height);
    card.style.transform = `scale(${scale})`;
  }
}

window.addEventListener("load", scaleToFit);
window.addEventListener("resize", scaleToFit);

mainBtn.onclick = async () => {

  if(!started){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});

    audioContext = new AudioContext();

    const src = audioContext.createMediaStreamSource(stream);

    const gain = audioContext.createGain();
    gain.gain.value = 1;

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;

    analyser.minDecibels = -90;
    analyser.maxDecibels = -10;
    analyser.smoothingTimeConstant = 0.8;

    dataArray = new Float32Array(analyser.fftSize);

    src.connect(gain);
    gain.connect(analyser);

    requestAnimationFrame(tick);
    started = true;
  }

  if (!isActive) {
    isActive = true;
    manuallyPaused = false;

    totalTime = parseInt(durationEl.value) * 60;
    timeLeft = totalTime;

    timeEl.textContent = formatTime(timeLeft);
    updateCircle();

  } else if (!manuallyPaused) {
    manuallyPaused = true;
  } else {
    manuallyPaused = false;
  }

  updateButtons();
};

resetBtn.onclick = () => {
  isActive = false;
  manuallyPaused = false;
  running = false;

  totalTime = parseInt(durationEl.value) * 60;
  timeLeft = totalTime;

  timeEl.textContent = formatTime(timeLeft);
  updateCircle();

  statusEl.textContent = "Ready";
  progressEl.style.stroke = "#22c55e";
  meterEl.style.width = "0%";

  updateButtons();
};
</script>

</body>
</html>
